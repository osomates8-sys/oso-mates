<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OSO MATES — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f8f8f6;--gray:#888;--light:#ebebeb;--mid:#444;--blue:#009ee3;--green:#2a9d5c;--red:#e74c3c;}
body{font-family:'Montserrat',sans-serif;background:#f0f0ee;color:var(--black);}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--black);}
.login-box{background:var(--white);padding:3rem;max-width:380px;width:100%;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:.3em;text-transform:uppercase;margin-bottom:.5rem;}
.login-sub{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);margin-bottom:2.5rem;}
.login-input{width:100%;padding:.9rem;border:1.5px solid var(--light);font-family:'Montserrat',sans-serif;font-size:.85rem;outline:none;margin-bottom:1rem;transition:border .2s;}
.login-input:focus{border-color:var(--black)}
.login-btn{width:100%;padding:1rem;background:var(--black);color:var(--white);border:none;font-family:'Montserrat',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;}
.login-error{font-size:.72rem;color:var(--red);margin-top:.8rem;display:none;}
.dashboard{display:none;}
.dash-nav{background:var(--black);padding:1.2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.dash-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--white);}
.dash-nav-links{display:flex;gap:1.5rem;}
.dash-nav-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem 1rem;cursor:pointer;transition:all .2s;}
.dash-nav-btn:hover,.dash-nav-btn.active{background:var(--white);color:var(--black);border-color:var(--white);}
.dash-nav-logout{background:none;border:none;color:rgba(255,255,255,.4);font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.1em;cursor:pointer;}
.dash-content{padding:2.5rem;max-width:1200px;margin:0 auto;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2.5rem;}
.stat-card{background:var(--white);padding:1.8rem;border:1px solid var(--light);}
.stat-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);margin-bottom:.8rem;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:300;color:var(--black);line-height:1;}
.section-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.section-bar h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;}
.products-table{background:var(--white);border:1px solid var(--light);}
.table-head{display:grid;grid-template-columns:60px 1fr 1fr 100px 120px 80px 120px;gap:1rem;padding:1rem 1.5rem;border-bottom:2px solid var(--black);background:var(--black);}
.th{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:600;}
.table-row{display:grid;grid-template-columns:60px 1fr 1fr 100px 120px 80px 120px;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--light);align-items:center;transition:background .2s;}
.table-row:hover{background:#fafafa}
.prod-img{width:50px;height:50px;object-fit:cover;}
.prod-name{font-family:'Cormorant Garamond',serif;font-size:1rem;}
.prod-mat{font-size:.65rem;color:var(--gray);}
.prod-price{font-family:'Cormorant Garamond',serif;font-size:1rem;}
.status-active{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .6rem;background:#e8f5e9;color:#2e7d32;}
.status-inactive{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .6rem;background:#fce4ec;color:#c62828;}
.prod-actions{display:flex;gap:.4rem;}
.btn-edit{background:none;border:1px solid var(--black);color:var(--black);font-family:'Montserrat',sans-serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .7rem;cursor:pointer;transition:all .2s;}
.btn-edit:hover{background:var(--black);color:var(--white);}
.btn-tog{background:none;border:1px solid var(--gray);color:var(--gray);font-family:'Montserrat',sans-serif;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .7rem;cursor:pointer;transition:all .2s;}
.btn-tog:hover{background:var(--gray);color:var(--white);}
.sales-table{background:var(--white);border:1px solid var(--light);}
.sales-head{display:grid;grid-template-columns:1fr 1fr 2fr 130px 100px 120px;gap:1rem;padding:1rem 1.5rem;border-bottom:2px solid var(--black);background:var(--black);}
.sales-row{display:grid;grid-template-columns:1fr 1fr 2fr 130px 100px 120px;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--light);align-items:center;font-size:.78rem;}
.sales-row:hover{background:#fafafa}
.sale-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;}
.sale-total{font-family:'Cormorant Garamond',serif;font-size:1rem;}
.sale-select{font-size:.6rem;letter-spacing:.08em;padding:.4rem .6rem;border:1px solid var(--light);font-family:'Montserrat',sans-serif;cursor:pointer;outline:none;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.8);z-index:5000;align-items:center;justify-content:center;padding:2rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:mIn .3s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:1.5rem 2rem;border-bottom:1px solid var(--light);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--gray);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;}
.modal-body{padding:2rem;}
.form-group{margin-bottom:1.2rem;}
.form-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);display:block;margin-bottom:.4rem;}
.form-input{width:100%;padding:.8rem;border:1.5px solid var(--light);font-family:'Montserrat',sans-serif;font-size:.82rem;outline:none;transition:border .2s;}
.form-input:focus{border-color:var(--black)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-actions{display:flex;gap:1rem;margin-top:1.5rem;}
.btn-save{flex:1;padding:.9rem;background:var(--black);color:var(--white);border:none;font-family:'Montserrat',sans-serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;}
.btn-cancel{flex:1;padding:.9rem;background:none;border:1px solid var(--black);color:var(--black);font-family:'Montserrat',sans-serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--black);color:var(--white);padding:1rem 2rem;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;z-index:9999;transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1}
.loading{text-align:center;padding:3rem;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);}
.add-btn{background:var(--black);color:var(--white);border:none;padding:.7rem 1.5rem;font-family:'Montserrat',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;}
@media(max-width:768px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .table-head,.table-row{grid-template-columns:1fr 1fr auto;}
  .sales-head,.sales-row{grid-template-columns:1fr 1fr auto;}
}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">Oso Mates</div>
    <div class="login-sub">Panel de administración</div>
    <input class="login-input" type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>
<div class="dashboard" id="dashboard">
  <div class="dash-nav">
    <div class="dash-logo">Oso Mates — Admin</div>
    <div class="dash-nav-links">
      <button class="dash-nav-btn active" onclick="showTab('ventas',this)">Ventas</button>
      <button class="dash-nav-btn" onclick="showTab('productos',this)">Productos</button>
    </div>
    <button class="dash-nav-logout" onclick="logout()">Cerrar sesión</button>
  </div>
  <div class="dash-content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Ventas totales</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Pedidos</div><div class="stat-value" id="stat-orders">—</div></div>
      <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value" id="stat-pending">—</div></div>
      <div class="stat-card"><div class="stat-label">Productos activos</div><div class="stat-value" id="stat-prods">—</div></div>
    </div>
    <div class="tab-content active" id="tab-ventas">
      <div class="section-bar"><h2>Pedidos</h2><button class="add-btn" onclick="loadSales()">Actualizar</button></div>
      <div class="sales-table">
        <div class="sales-head">
          <div class="th">Cliente</div><div class="th">Email</div><div class="th">Detalle</div>
          <div class="th">Método</div><div class="th">Total</div><div class="th">Estado</div>
        </div>
        <div id="sales-body"><div class="loading">Cargando...</div></div>
      </div>
    </div>
    <div class="tab-content" id="tab-productos">
      <div class="section-bar"><h2>Catálogo</h2><button class="add-btn" onclick="openNewProduct()">+ Nuevo producto</button></div>
      <div class="products-table">
        <div class="table-head">
          <div class="th">Foto</div><div class="th">Nombre</div><div class="th">Material</div>
          <div class="th">Precio</div><div class="th">Transf.</div><div class="th">Estado</div><div class="th">Acciones</div>
        </div>
        <div id="products-body"><div class="loading">Cargando...</div></div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="prod-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Producto</div>
      <button class="modal-close" onclick="closeModal()">&#x2715; Cerrar</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="prod-id"/>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="prod-nombre"/></div>
        <div class="form-group"><label class="form-label">Material *</label><input class="form-input" id="prod-material"/></div>
      </div>
      <div class="form-group"><label class="form-label">Descripción</label><input class="form-input" id="prod-desc"/></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Precio *</label><input class="form-input" type="number" id="prod-precio"/></div>
        <div class="form-group"><label class="form-label">Precio transferencia</label><input class="form-input" type="number" id="prod-transf"/></div>
      </div>
      <div class="form-group"><label class="form-label">Link Mercado Pago</label><input class="form-input" id="prod-mp"/></div>
      <div class="form-group"><label class="form-label">Nombre de imagen</label><input class="form-input" id="prod-img" placeholder="camionero.jpg"/></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Categoría</label>
          <select class="form-input" id="prod-cat"><option value="madera">Madera</option><option value="calabaza">Calabaza</option></select>
        </div>
        <div class="form-group"><label class="form-label">Badge (opcional)</label><input class="form-input" id="prod-badge" placeholder="Popular, Nuevo..."/></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" onclick="saveProduct()">Guardar</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

const PASS = 'osomates2025';
let prodCache = [];

function doLogin(){
  if(document.getElementById('login-pass').value===PASS){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadAll();
  }else{
    document.getElementById('login-error').style.display='block';
  }
}
function logout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login-pass').value='';
}
function showTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.dash-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}
function fmt(n){return '$'+parseInt(n).toLocaleString('es-AR');}
function getImg(img){return IMG_MAP[img]||img;}

async function loadAll(){
  await Promise.all([loadStats(),loadSales(),loadProducts()]);
}

async function loadStats(){
  const {data:v}=await sb.from('ventas').select('total,estado');
  const {data:p}=await sb.from('productos').select('activo');
  if(v){
    document.getElementById('stat-total').textContent=fmt(v.reduce((s,x)=>s+(x.total||0),0));
    document.getElementById('stat-orders').textContent=v.length;
    document.getElementById('stat-pending').textContent=v.filter(x=>x.estado==='pendiente').length;
  }
  if(p) document.getElementById('stat-prods').textContent=p.filter(x=>x.activo).length;
}

async function loadSales(){
  const {data}=await sb.from('ventas').select('*').order('created_at',{ascending:false});
  const body=document.getElementById('sales-body');
  if(!data||!data.length){body.innerHTML='<div class="loading">Sin ventas aún</div>';return;}
  body.innerHTML=data.map(v=>`
    <div class="sales-row">
      <div class="sale-name">${v.cliente_nombre||'—'}</div>
      <div style="font-size:.7rem;color:var(--gray)">${v.cliente_email||'—'}</div>
      <div style="font-size:.68rem;color:var(--mid)">${(v.detalle||'').substring(0,50)}...</div>
      <div style="font-size:.68rem">${v.metodo_pago||'—'}</div>
      <div class="sale-total">${fmt(v.total||0)}</div>
      <div>
        <select class="sale-select" onchange="updateSaleStatus('${v.id}',this.value)">
          <option value="pendiente" ${v.estado==='pendiente'?'selected':''}>Pendiente</option>
          <option value="confirmado" ${v.estado==='confirmado'?'selected':''}>Confirmado</option>
          <option value="enviado" ${v.estado==='enviado'?'selected':''}>Enviado</option>
        </select>
      </div>
    </div>`).join('');
}

async function updateSaleStatus(id,estado){
  await sb.from('ventas').update({estado}).eq('id',id);
  showToast('Estado actualizado ✓');
  loadStats();
}

async function loadProducts(){
  const {data}=await sb.from('productos').select('*').order('created_at');
  const body=document.getElementById('products-body');
  if(!data||!data.length){body.innerHTML='<div class="loading">Sin productos</div>';return;}
  prodCache=data;
  body.innerHTML=data.map((p,i)=>`
    <div class="table-row">
      <img src="${getImg(p.imagen)}" alt="${p.nombre}" class="prod-img"/>
      <div><div class="prod-name">${p.nombre}</div><div style="font-size:.6rem;color:var(--gray)">${p.badge||''}</div></div>
      <div class="prod-mat">${p.material}</div>
      <div class="prod-price">${fmt(p.precio)}</div>
      <div class="prod-price">${fmt(p.precio_transferencia)}</div>
      <div><span class="${p.activo?'status-active':'status-inactive'}">${p.activo?'Activo':'Inactivo'}</span></div>
      <div class="prod-actions">
        <button class="btn-edit" onclick="openEditProduct(${i})">Editar</button>
        <button class="btn-tog" onclick="toggleProduct('${p.id}',${p.activo})">${p.activo?'Ocultar':'Activar'}</button>
      </div>
    </div>`).join('');
}

function openEditProduct(idx){
  const p=prodCache[idx];
  if(!p)return;
  document.getElementById('modal-title').textContent='Editar producto';
  document.getElementById('prod-id').value=p.id;
  document.getElementById('prod-nombre').value=p.nombre||'';
  document.getElementById('prod-material').value=p.material||'';
  document.getElementById('prod-desc').value=p.descripcion||'';
  document.getElementById('prod-precio').value=p.precio||'';
  document.getElementById('prod-transf').value=p.precio_transferencia||'';
  document.getElementById('prod-mp').value=p.link_mp||'';
  document.getElementById('prod-img').value=p.imagen||'';
  document.getElementById('prod-cat').value=p.categoria||'madera';
  document.getElementById('prod-badge').value=p.badge||'';
  document.getElementById('prod-modal').classList.add('open');
}

function openNewProduct(){
  document.getElementById('modal-title').textContent='Nuevo producto';
  document.getElementById('prod-id').value='';
  ['nombre','material','desc','mp','img','badge'].forEach(f=>document.getElementById('prod-'+f).value='');
  document.getElementById('prod-precio').value='';
  document.getElementById('prod-transf').value='';
  document.getElementById('prod-cat').value='madera';
  document.getElementById('prod-modal').classList.add('open');
}

function closeModal(){document.getElementById('prod-modal').classList.remove('open');}

async function saveProduct(){
  const id=document.getElementById('prod-id').value;
  const data={
    nombre:document.getElementById('prod-nombre').value,
    material:document.getElementById('prod-material').value,
    descripcion:document.getElementById('prod-desc').value,
    precio:parseInt(document.getElementById('prod-precio').value)||0,
    precio_transferencia:parseInt(document.getElementById('prod-transf').value)||0,
    link_mp:document.getElementById('prod-mp').value,
    imagen:document.getElementById('prod-img').value,
    categoria:document.getElementById('prod-cat').value,
    badge:document.getElementById('prod-badge').value||null,
    activo:true,
  };
  if(!data.nombre||!data.precio){showToast('Nombre y precio son obligatorios');return;}
  let error;
  if(id){({error}=await sb.from('productos').update(data).eq('id',id));}
  else{({error}=await sb.from('productos').insert(data));}
  if(error){showToast('Error: '+error.message);return;}
  showToast(id?'Producto actualizado ✓':'Producto creado ✓');
  closeModal();
  loadProducts();
  loadStats();
}

async function toggleProduct(id,activo){
  await sb.from('productos').update({activo:!activo}).eq('id',id);
  showToast(activo?'Producto ocultado':'Producto activado');
  loadProducts();loadStats();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
