<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧉</text></svg>"/>
<title>OSO MATES — Página no encontrada</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f8f8f6;--gray:#888;--light:#ebebeb;--mid:#444;--warm:#c8956c;}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--white);color:var(--black);}
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 4rem;background:rgba(248,248,246,0.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--light);}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:var(--black);text-decoration:none;}
.back-btn{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
.back-btn:hover{color:var(--black)}
main{max-width:760px;margin:0 auto;padding:9rem 1.5rem 6rem;text-align:center;min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.error-emoji{font-size:4rem;margin-bottom:1.5rem;}
.error-code{font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--warm);margin-bottom:1.2rem;}
.error-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,3.4rem);font-weight:300;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem;}
.error-desc{font-size:.85rem;font-weight:300;line-height:1.95;color:var(--mid);max-width:480px;margin:0 auto 2.5rem;}
.error-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.btn-primary,.btn-secondary{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:1rem 2rem;text-decoration:none;transition:all .2s;}
.btn-primary{background:var(--black);color:var(--white);}
.btn-primary:hover{background:var(--warm);}
.btn-secondary{border:1px solid var(--black);color:var(--black);}
.btn-secondary:hover{background:var(--black);color:var(--white);}
footer{text-align:center;padding:3rem 1.5rem;border-top:1px solid var(--light);}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:var(--black);margin-bottom:.6rem;}
.footer-copy{font-size:.58rem;letter-spacing:.15em;color:var(--gray);}
@media(max-width:768px){
  nav{padding:1.2rem 1.5rem;}
  main{padding:7rem 1.2rem 4rem;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Oso <em style="font-style:italic">Mates</em></a>
  <a href="index.html" class="back-btn">&#8592; Volver al inicio</a>
</nav>
<main>
  <div class="error-emoji">🧉</div>
  <div class="error-code">Error 404</div>
  <h1 class="error-title">Esta página<br/><em style="font-style:italic">no existe</em></h1>
  <p class="error-desc">Puede que el enlace esté roto o que la página se haya movido. Volvé al catálogo para seguir mirando nuestros mates artesanales.</p>
  <div class="error-actions">
    <a href="index.html" class="btn-primary">Ver catálogo</a>
    <a href="https://wa.me/542233061168?text=Hola!%20Vi%20un%20enlace%20roto%20en%20la%20p%C3%A1gina." target="_blank" class="btn-secondary">Escribirnos</a>
  </div>
</main>
<footer>
  <div class="footer-logo">Oso Mates</div>
  <div class="footer-copy">&#169; 2026 &#8212; Hecho en Argentina</div>
</footer>
</body>
</html>
